name: Test Build & Prerelease

on:
  push:
    branches:
      # 按需修改为你的开发分支
      - develop
      - dev
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: read

concurrency:
  group: test-build-prerelease-${{ github.ref }}
  cancel-in-progress: true

env:
  COMMIT_ID: ${{ github.sha }}
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sealchat
  PRERELEASE_TAG: dev-prerelease

jobs:
  ui-build:
    name: Build UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build UI
        run: |
          cd ui
          corepack enable
          yarn install
          yarn build-only

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui
          path: ./ui/dist

  backend-build:
    name: Build Server
    runs-on: ubuntu-latest
    needs: ui-build

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux_amd64
            goos: linux
            goarch: amd64
          - name: linux_arm64
            goos: linux
            goarch: arm64
          - name: windows_amd64
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: ui
          path: ./ui/dist

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.11.0

      - name: Set build info
        id: build_info
        run: |
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "DATE=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "VERSION=$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          BUILD_VERSION: ${{ steps.build_info.outputs.VERSION }}
        run: |
          mkdir -p output

          if [ "${{ matrix.goos }}" = "linux" ]; then
            if [ "${{ matrix.goarch }}" = "amd64" ]; then
              CC="zig cc -target x86_64-linux-musl" \
                go build \
                -o "output/sealchat-server" \
                -trimpath \
                -ldflags "-s -w -linkmode external -extldflags '-static' -X sealchat/utils.BuildVersion=${BUILD_VERSION}" \
                .
            elif [ "${{ matrix.goarch }}" = "arm64" ]; then
              CC="zig cc -target aarch64-linux-musl" \
                go build \
                -o "output/sealchat-server" \
                -trimpath \
                -ldflags "-s -w -linkmode external -extldflags '-static' -X sealchat/utils.BuildVersion=${BUILD_VERSION}" \
                .
            else
              echo "Unsupported linux arch: ${{ matrix.goarch }}"
              exit 1
            fi
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            CC="zig cc -target x86_64-windows-gnu" \
              go build \
              -o "output/sealchat-server.exe" \
              -trimpath \
              -ldflags "-s -w -X sealchat/utils.BuildVersion=${BUILD_VERSION}" \
              .
          else
            echo "Unsupported OS: ${{ matrix.goos }}"
            exit 1
          fi

      - name: Prepare package
        run: |
          set -euo pipefail

          rm -rf package
          mkdir -p package/bin

          if [ "${{ matrix.goos }}" = "linux" ]; then
            cp output/sealchat-server package/

            if [ "${{ matrix.goarch }}" = "amd64" ]; then
              WEBP_DIR="linux-x64"
            elif [ "${{ matrix.goarch }}" = "arm64" ]; then
              WEBP_DIR="linux-arm64"
            else
              echo "Unsupported arch: ${{ matrix.goarch }}"
              exit 1
            fi
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            cp output/sealchat-server.exe package/
            WEBP_DIR="win-x64"
          else
            echo "Unsupported OS: ${{ matrix.goos }}"
            exit 1
          fi

          mkdir -p "package/bin/${WEBP_DIR}"
          cp -a "bin/${WEBP_DIR}/." "package/bin/${WEBP_DIR}/"

          cp bin/LICENSE package/LICENSE
          cp config.yaml.example package/
          cp config.docker.yaml.example package/

      - name: Upload unpacked package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sealchat_test_${{ github.sha }}_${{ matrix.name }}
          path: ./package

      - name: Compress package
        run: |
          mkdir -p release

          if [ "${{ matrix.goos }}" = "linux" ]; then
            tar -czvf \
              "release/sealchat_test_${{ steps.build_info.outputs.VERSION }}_${{ matrix.name }}.tar.gz" \
              -C package .
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            cd package
            zip -r \
              "../release/sealchat_test_${{ steps.build_info.outputs.VERSION }}_${{ matrix.name }}.zip" \
              .
          fi

      - name: Upload compressed release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: ./release/*

  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ui-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download UI artifact
        uses: actions/download-artifact@v4
        with:
          name: ui
          path: ./ui/dist

      - name: Set build info
        id: build_info
        run: |
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "DATE=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "VERSION=$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io \
              -u "${{ github.actor }}" \
              --password-stdin

      - name: Build test image
        run: |
          docker build \
            --build-arg BUILD_VERSION="${{ steps.build_info.outputs.VERSION }}" \
            -t "${{ env.IMAGE_NAME }}:dev" \
            -t "${{ env.IMAGE_NAME }}:prerelease" \
            -t "${{ env.IMAGE_NAME }}:sha-${{ github.sha }}" \
            -t "${{ env.IMAGE_NAME }}:${{ steps.build_info.outputs.VERSION }}" \
            -f Dockerfile \
            .

      - name: Push test image
        run: |
          docker push "${{ env.IMAGE_NAME }}:dev"
          docker push "${{ env.IMAGE_NAME }}:prerelease"
          docker push "${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          docker push "${{ env.IMAGE_NAME }}:${{ steps.build_info.outputs.VERSION }}"

  update-prerelease:
    name: Update Prerelease Page
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download compressed artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: ./release
          merge-multiple: true

      - name: Set build info
        id: build_info
        run: |
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "DATE=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "VERSION=$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "BRANCH_NAME=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate prerelease notes
        run: |
          set -euo pipefail

          VERSION="${{ steps.build_info.outputs.VERSION }}"
          BRANCH_NAME="${{ steps.build_info.outputs.BRANCH_NAME }}"

          {
            echo "# SealChat 自动测试构建"
            echo
            echo "> 这是开发分支的自动构建版本，可能不稳定，不建议用于生产环境。"
            echo
            echo "## 构建信息"
            echo
            echo "- 分支：\`${BRANCH_NAME}\`"
            echo "- Commit：\`${{ github.sha }}\`"
            echo "- 短 Commit：\`${{ steps.build_info.outputs.SHORT_SHA }}\`"
            echo "- 构建版本：\`${VERSION}\`"
            echo "- Workflow：[#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo
            echo "## Docker 镜像"
            echo
            echo "\`\`\`bash"
            echo "docker pull ${{ env.IMAGE_NAME }}:dev"
            echo "docker pull ${{ env.IMAGE_NAME }}:prerelease"
            echo "docker pull ${{ env.IMAGE_NAME }}:${VERSION}"
            echo "docker pull ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
            echo "\`\`\`"
            echo
            echo "## 最近提交"
            echo
          } > RELEASE_BODY.md

          LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"

          if [ -n "$LAST_TAG" ]; then
            git log --format='- %s `%h`' "${LAST_TAG}..HEAD" >> RELEASE_BODY.md
          else
            git log --format='- %s `%h`' -20 >> RELEASE_BODY.md
          fi

          echo >> RELEASE_BODY.md
          echo "## 下载" >> RELEASE_BODY.md
          echo >> RELEASE_BODY.md
          echo "请在本页面底部 Assets 中下载对应平台的测试包。" >> RELEASE_BODY.md

      - name: Move prerelease tag to current commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f "${{ env.PRERELEASE_TAG }}" "${{ github.sha }}"
          git push -f origin "refs/tags/${{ env.PRERELEASE_TAG }}"

      - name: Create or update prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ env.PRERELEASE_TAG }}"
          TITLE="SealChat 自动测试构建 ${{ steps.build_info.outputs.VERSION }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Existing prerelease found, updating..."

            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file RELEASE_BODY.md \
              --prerelease \
              --latest=false

            echo "Deleting old assets..."

            ASSETS="$(gh release view "$TAG" --json assets --jq '.assets[].name')"

            if [ -n "$ASSETS" ]; then
              while IFS= read -r asset; do
                if [ -n "$asset" ]; then
                  gh release delete-asset "$TAG" "$asset" -y
                fi
              done <<< "$ASSETS"
            fi

            gh release upload "$TAG" ./release/* --clobber
          else
            echo "Prerelease does not exist, creating..."

            gh release create "$TAG" ./release/* \
              --title "$TITLE" \
              --notes-file RELEASE_BODY.md \
              --prerelease \
              --latest=false \
              --target "${{ github.sha }}"
          fi
